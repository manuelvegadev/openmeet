services:
  openmeet:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=https://openmeet.mvega.pro
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  uploads:

networks:
  dokploy-network:
    external: true
